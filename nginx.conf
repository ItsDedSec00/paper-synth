server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # PWA manifest MIME type — must come before include mime.types.
    types {
        application/manifest+json webmanifest;
    }
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml;

    # Service worker — must never be cached or PWA updates break.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache, must-revalidate";
        expires 0;
    }

    # Hashed asset bundles — safe to cache forever (the hash changes on rebuild).
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback — single page app, route everything to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
